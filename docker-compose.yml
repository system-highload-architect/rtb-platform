version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rtb
      POSTGRES_PASSWORD: rtbpass
      POSTGRES_DB: rtb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rtb"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "9000:9000"
      - "8123:8123"
    environment:
      CLICKHOUSE_DB: rtb
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: rtb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  aerospike:
    image: aerospike/aerospike-server-enterprise:7.0.0.0
    ports:
      - "3000:3000"
      - "3001:3001"
      - "3002:3002"
    environment:
      NAMESPACE: rtb
      REPL-FACTOR: 1
      MEMORY-SIZE: 1G
      DEFAULT-TTL: 30d
    volumes:
      - aerospike_data:/opt/aerospike/data
    healthcheck:
      test: ["CMD-SHELL", "asinfo -v STATUS || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: ./services/auth/Dockerfile
    ports:
      - "9004:9004"
    environment:
      SERVER_PORT: 9004
      JWT_SECRET: super-secret-key-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 72h

  accounting:
    build:
      context: .
      dockerfile: ./services/accounting/Dockerfile
    ports:
      - "9002:9002"
    environment:
      SERVER_PORT: 9002
      DATABASE_DSN: postgres://rtb:rtbpass@postgres:5432/rtb?sslmode=disable
      IDEMPOTENCY_TTL: 5m
    depends_on:
      postgres:
        condition: service_healthy

  analytics:
    build:
      context: .
      dockerfile: ./services/analytics/Dockerfile
    ports:
      - "9003:9003"
    environment:
      SERVER_PORT: 9003
      CLICKHOUSE_DSN: clickhouse:9000
    depends_on:
      clickhouse:
        condition: service_healthy

  auction:
    build:
      context: .
      dockerfile: ./services/auction/Dockerfile
    ports:
      - "9001:9001"
    environment:
      SERVER_PORT: 9001
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: rtb
      ACCOUNTING_GRPC: accounting:9002
    depends_on:
      mongodb:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: ./services/gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      GRPC_AUCTION: auction:9001
      GRPC_ACCOUNTING: accounting:9002
      GRPC_ANALYTICS: analytics:9003
      GRPC_AUTH: auth:9004
    depends_on:
      - auction
      - accounting
      - analytics
      - auth

volumes:
  pgdata:
  mongo_data:
  aerospike_data: