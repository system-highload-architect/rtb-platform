server:
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 30s

grpc:
  auction: "localhost:9001"
  accounting: "localhost:9002"
  analytics: "localhost:9003"
  auth: "localhost:9004"

security:
  rate_limit: 100.0
  rate_burst: 200.0
  idempotency_ttl: 5m

log:
  level: debug
  format: text

metrics:
  use_otlp: false
