server:
  port: 8080
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 30s

grpc:
  auction: "auction:9001"
  accounting: "accounting:9002"
  analytics: "analytics:9003"
  auth: "auth:9004"

security:
  rate_limit: 100
  rate_burst: 200
  idempotency_ttl: 5m

log:
  level: "debug"
  format: "json"

metrics:
  use_otlp: false 