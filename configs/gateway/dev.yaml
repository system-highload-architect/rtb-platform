server:
  port: 9090
  read_timeout: 5s
  write_timeout: 10s
  idle_timeout: 30s

grpc:
  auction: "localhost:50051"
  accounting: "localhost:50052"
  analytics: "localhost:50053"

security:
  rate_limit: 100.0
  rate_burst: 200.0
  idempotency_ttl: 5m

log:
  level: debug
  format: text

metrics:
  use_otlp: false